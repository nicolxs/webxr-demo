<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Print Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      background: #0c0c0c;
      color: #fff;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: radial-gradient(ellipse at 60% 40%, #1a0404 0%, #0c0c0c 70%);
      text-align: center; padding: 32px;
    }
    #overlay h1 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 10px; color: #fff;
    }
    #overlay h1 span { color: #e53935; }
    #overlay p {
      font-size: 14px; color: #999; max-width: 340px; line-height: 1.65;
      margin-bottom: 32px; font-family: system-ui, sans-serif;
    }
    #start-btn {
      padding: 14px 36px; font-size: 16px; font-weight: 700;
      font-family: 'Courier New', monospace; letter-spacing: 1px;
      background: #e53935; color: #fff; border: none;
      border-radius: 4px; cursor: pointer;
      box-shadow: 0 0 32px rgba(229,57,53,0.4);
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    #start-btn:disabled { background: #333; box-shadow: none; cursor: not-allowed; color: #666; }
    #start-btn:not(:disabled):hover { box-shadow: 0 0 48px rgba(229,57,53,0.6); }
    .note { font-size: 11px; color: #555; margin-top: 18px; font-family: system-ui; }

    #ar-ui {
      position: fixed; inset: 0; z-index: 50;
      pointer-events: none; display: none;
    }
    #ar-ui.active { display: block; }

    /* Make only the interactive containers receive pointer events */
    #mode-bar, #color-panel {
      pointer-events: auto;
    }

    #info-bar {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.85); padding: 9px 22px;
      border-radius: 24px; font-size: 12px; letter-spacing: 0.8px;
      border: 1px solid rgba(255,255,255,0.08); white-space: nowrap;
      pointer-events: none;
    }

    #mode-bar {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px;
    }
    .mode-btn {
      padding: 12px 16px; font-size: 12px; font-weight: 700;
      font-family: 'Courier New', monospace; letter-spacing: 0.8px;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      outline: none;
      -webkit-user-select: none;
    }
    .mode-btn.active {
      background: rgba(229,57,53,0.85); border-color: #e53935;
      color: #fff; box-shadow: 0 0 16px rgba(229,57,53,0.4);
    }
    .mode-btn.danger { color: rgba(255,130,130,0.9); }
    .mode-btn:active { opacity: 0.8; }

    #color-panel {
      position: absolute; bottom: 88px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; padding: 12px 18px;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 40px;
      opacity: 0; transform: translateX(-50%) translateY(12px);
      transition: opacity 0.2s, transform 0.2s;
    }
    #color-panel.visible {
      opacity: 1; transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    #color-panel:not(.visible) { 
      pointer-events: none; 
      opacity: 0;
    }

    .swatch {
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    .swatch.active { border-color: #fff; transform: scale(1.25); }
    .swatch:active { transform: scale(1.1); }

    #toast {
      position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
      background: rgba(229,57,53,0.9); backdrop-filter: blur(12px);
      color: #fff; padding: 8px 22px; border-radius: 20px;
      font-size: 12px; letter-spacing: 0.6px; pointer-events: none;
      opacity: 0; transition: opacity 0.25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    #tracking-toast {
      position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(229,57,53,0.88); backdrop-filter: blur(12px);
      color: #fff; padding: 8px 22px; border-radius: 20px;
      font-size: 12px; letter-spacing: 0.6px; pointer-events: none;
      opacity: 0; transition: opacity 0.25s; white-space: nowrap;
    }
    #tracking-toast.show { opacity: 1; }

    .osi {
      position: absolute; pointer-events: none;
      display: none;
    }
    .osi-badge {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(229,57,53,0.9); border: 2px solid rgba(255,255,255,0.6);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; line-height: 1.1; gap: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .osi-dir { font-size: 13px; }
    .osi-num { font-size: 9px; opacity: 0.85; }

    .ripple {
      position: fixed; border-radius: 50%;
      width: 60px; height: 60px;
      background: rgba(229,57,53,0.5);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-out 0.55s ease-out forwards;
    }
    @keyframes ripple-out {
      to { transform: translate(-50%, -50%) scale(5); opacity: 0; }
    }

    #sel-flash {
      position: fixed; left: 50%; top: 50%;
      width: 70px; height: 70px;
      border: 2.5px solid #e53935; border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      opacity: 0;
    }
    #sel-flash.pop {
      animation: sel-pop 0.35s ease-out forwards;
    }
    @keyframes sel-pop {
      0%  { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
      60% { transform: translate(-50%,-50%) scale(1.3); opacity: 0.8; }
      100%{ transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
    }

    canvas { display: block; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="overlay">
  <h1>AR <span>Print</span> Preview</h1>
  <p>Visualise your model at real-world scale before committing filament. Place, rotate, scale, and recolor — directly in your space.</p>
  <button id="start-btn" disabled>Checking WebXR…</button>
  <p class="note">Android Chrome required for WebXR hit-test</p>
</div>

<div id="ar-ui">
  <div id="info-bar">TAP RING TO PLACE</div>
  <div id="tracking-toast">POINT AT A FLAT SURFACE</div>
  <div id="color-panel"></div>
  <div id="mode-bar">
    <button class="mode-btn active" data-mode="place">＋ PLACE</button>
    <button class="mode-btn"        data-mode="rotate">↻ ROTATE</button>
    <button class="mode-btn"        data-mode="scale">⊕ SCALE</button>
    <button class="mode-btn"        data-mode="color">● COLOR</button>
    <button class="mode-btn danger" data-mode="clear">✕ CLEAR</button>
  </div>
  <div id="toast"></div>
  <div id="sel-flash"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { ARButton }   from 'three/addons/webxr/ARButton.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader }  from 'three/addons/loaders/OBJLoader.js';

/* ========================================================
   CONFIGURATION
   ======================================================== */
const CONFIG = {
  ROTATION_SENSITIVITY: 0.009,
  DRAG_THRESHOLD: 6,
  PLACEMENT_ANIM_MS: 380,
  MIN_SCALE: 0.05,
  MAX_SCALE: 10,
  OSI_MARGIN: 28,
  OSI_UPDATE_INTERVAL: 100,
  PINCH_SELECT_COOLDOWN: 400,
  TRACKING_LOST_DELAY: 2000,
  HIT_TEST_RETRY_MS: 500,
  MAX_PIXEL_RATIO: 2,
};

/* ========================================================
   GLOBAL STATE
   ======================================================== */
let camera, scene, renderer, reticle, controller;
let hitTestSource = null, hitTestSourceRequested = false;
let modelTemplate  = null;
const placedModels = [];
let selectedModel  = null;

let activeMode  = 'place';
let dragDist    = 0;
let wasDragging = false;
let t0X = 0, t0Y = 0;
let rotStartY   = 0;
let pinchStartD = 0;
let pinchStartS = 1;
let isPinching  = false;
let lastPinchEndTime = 0;

let trackingLost = false;
let lastHitTime = 0;
let trackingLostToastTimer = null;
let hitTestRetryTimer = null;

const animations = new Map();

const PALETTE = [
  { css: '#d32f2f', three: 0xd32f2f },
  { css: '#e65100', three: 0xe65100 },
  { css: '#f9a825', three: 0xf9a825 },
  { css: '#2e7d32', three: 0x2e7d32 },
  { css: '#1565c0', three: 0x1565c0 },
  { css: '#6a1b9a', three: 0x6a1b9a },
  { css: '#00838f', three: 0x00838f },
  { css: '#f5f5f5', three: 0xf5f5f5 },
  { css: '#212121', three: 0x212121 },
];
let colorIdx = 0;

const DIR8 = ['→','↘','↓','↙','←','↖','↑','↗'];

const $overlay      = document.getElementById('overlay');
const $arUI         = document.getElementById('ar-ui');
const $infoBar      = document.getElementById('info-bar');
const $toast        = document.getElementById('toast');
const $trackingToast = document.getElementById('tracking-toast');
const $colorPanel   = document.getElementById('color-panel');
const $selFlash     = document.getElementById('sel-flash');

/* ========================================================
   UI HELPERS
   ======================================================== */
function showToast(msg, ms = 2200) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => $toast.classList.remove('show'), ms);
}

function showTrackingToast(msg, isPersistent = false) {
  $trackingToast.textContent = msg;
  $trackingToast.classList.add('show');
  clearTimeout(trackingLostToastTimer);
  if (!isPersistent) {
    trackingLostToastTimer = setTimeout(() => {
      $trackingToast.classList.remove('show');
    }, CONFIG.TRACKING_LOST_DELAY);
  }
}

function hideTrackingToast() {
  $trackingToast.classList.remove('show');
  clearTimeout(trackingLostToastTimer);
}

function setMode(m) {
  if (m === 'clear') {
    clearAllModels();
    showToast('All models cleared');
    updateInfo();
    return;
  }
  activeMode = m;
  document.querySelectorAll('.mode-btn[data-mode]').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === m));
  $colorPanel.classList.toggle('visible', m === 'color');
  updateInfo();
}

const INFO_MSGS = {
  place:  ['TAP RING TO PLACE', 'TAP MODEL TO SELECT IT'],
  rotate: ['TAP MODEL TO SELECT', 'DRAG TO ROTATE'],
  scale:  ['TAP MODEL TO SELECT', 'PINCH TO SCALE'],
  color:  ['TAP MODEL TO SELECT', 'PICK A COLOR BELOW'],
};
function updateInfo() {
  const has = !!selectedModel;
  const msgs = INFO_MSGS[activeMode] || [''];
  $infoBar.textContent = msgs[has ? 1 : 0];
}

function applyColor(obj, hex) {
  obj.traverse(child => {
    if (!child.isMesh) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(mat => { if (mat.color) mat.color.setHex(hex); });
  });
}

function setEmissive(obj, hex) {
  obj.traverse(child => {
    if (!child.isMesh) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(mat => { if (mat.emissive) mat.emissive.setHex(hex); });
  });
}

function selectModel(m) {
  if (selectedModel) setEmissive(selectedModel, 0x000000);
  selectedModel = m;
  setEmissive(m, 0x3a0000);
  flashSelectionRing();
  updateInfo();
  showToast('SELECTED — ' + (activeMode === 'rotate' ? 'DRAG TO ROTATE'
    : activeMode === 'scale' ? 'PINCH TO SCALE'
    : activeMode === 'color' ? 'PICK A COLOR'
    : 'SWITCH MODE TO EDIT'));
}

function deselect() {
  if (!selectedModel) return;
  setEmissive(selectedModel, 0x000000);
  selectedModel = null;
  updateInfo();
}

function flashSelectionRing() {
  $selFlash.classList.remove('pop');
  void $selFlash.offsetWidth;
  $selFlash.classList.add('pop');
}

function spawnRipple() {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = '50%';
  r.style.top  = '50%';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

/* ========================================================
   OFF‑SCREEN INDICATORS (OSI)
   ======================================================== */
const osiEls = [];
function getOSI(i) {
  if (!osiEls[i]) {
    const el = document.createElement('div');
    el.className = 'osi';
    el.innerHTML = `<div class="osi-badge"><span class="osi-dir"></span><span class="osi-num">#${i+1}</span></div>`;
    $arUI.appendChild(el);
    osiEls[i] = el;
  }
  return osiEls[i];
}

const _projV = new THREE.Vector3();
function updateOSI() {
  const W = window.innerWidth, H = window.innerHeight;
  const margin = CONFIG.OSI_MARGIN;
  placedModels.forEach((m, i) => {
    const el = getOSI(i);
    m.getWorldPosition(_projV);
    _projV.project(camera);

    const sx = (_projV.x  + 1) / 2 * W;
    const sy = (-_projV.y + 1) / 2 * H;
    const behind = _projV.z > 1;
    const onScreen = !behind
      && sx > margin && sx < W - margin
      && sy > margin && sy < H - margin;

    if (onScreen) {
      el.style.display = 'none';
    } else {
      el.style.display = 'block';
      const cx = W / 2, cy = H / 2;
      let dx = sx - cx, dy = sy - cy;
      let angle = Math.atan2(dy, dx);
      if (behind) {
        dx = -dx; dy = -dy;
        angle += Math.PI;
      }
      const dirIdx = Math.round((angle / Math.PI) * 4 + 4) % 8;
      el.querySelector('.osi-dir').textContent = DIR8[dirIdx];

      const hw = cx - 44, hh = cy - 44;
      const ca = Math.abs(Math.cos(angle)), sa = Math.abs(Math.sin(angle));
      const t  = (hw * sa <= hh * ca) ? hw / (ca || 1e-6) : hh / (sa || 1e-6);
      el.style.left = (cx + Math.cos(angle) * t - 20) + 'px';
      el.style.top  = (cy + Math.sin(angle) * t - 20) + 'px';
    }
  });
}

/* ========================================================
   TOUCH HANDLING – only for pinch and drag manipulation
   ======================================================== */
document.addEventListener('touchstart', e => {
  dragDist = 0;
  wasDragging = false;
  if (e.touches.length === 2) {
    isPinching = true;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartD = Math.hypot(dx, dy);
    pinchStartS = selectedModel ? selectedModel.scale.x : 1;
  } else {
    isPinching = false;
  }
  if (e.touches.length === 1) {
    t0X = e.touches[0].clientX;
    t0Y = e.touches[0].clientY;
    rotStartY = selectedModel ? selectedModel.rotation.y : 0;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!selectedModel) return;
  if (e.touches.length === 2 && activeMode === 'scale') {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const ratio = dist / (pinchStartD || 1);
    selectedModel.scale.setScalar(
      Math.max(CONFIG.MIN_SCALE, Math.min(CONFIG.MAX_SCALE, pinchStartS * ratio))
    );
    wasDragging = true;
  } else if (e.touches.length === 1 && (activeMode === 'rotate' || activeMode === 'place')) {
    const dx = e.touches[0].clientX - t0X;
    const dy = e.touches[0].clientY - t0Y;
    dragDist = Math.hypot(dx, dy);
    if (dragDist > CONFIG.DRAG_THRESHOLD) {
      selectedModel.rotation.y = rotStartY + dx * CONFIG.ROTATION_SENSITIVITY;
      wasDragging = true;
    }
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  if (isPinching && e.touches.length < 2) {
    lastPinchEndTime = performance.now();
    wasDragging = true;
    isPinching = false;
  }
  setTimeout(() => {
    if (performance.now() - lastPinchEndTime > CONFIG.PINCH_SELECT_COOLDOWN) {
      wasDragging = false;
    }
  }, CONFIG.PINCH_SELECT_COOLDOWN);
}, { passive: true });

/* ========================================================
   UI BUTTONS – simple click handlers, no over-engineering
   ======================================================== */

// Build color swatches
PALETTE.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'swatch' + (i === 0 ? ' active' : '');
  el.style.background = c.css;
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    colorIdx = i;
    if (selectedModel) applyColor(selectedModel, c.three);
    showToast('Color applied');
  });
  $colorPanel.appendChild(el);
});

// Mode buttons – unified handler for both mode and clear
document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const mode = btn.dataset.mode;
    setMode(mode);
  });
});

/* ========================================================
   SELECT & PLACE
   ======================================================== */
const _raycaster = new THREE.Raycaster();
const _selectOrigin = new THREE.Vector3();
const _selectDirection = new THREE.Vector3();

function onSelect() {
  if (wasDragging || (performance.now() - lastPinchEndTime < CONFIG.PINCH_SELECT_COOLDOWN)) {
    wasDragging = false;
    return;
  }

  if (!controller || !controller.matrixWorld) return;

  const mat = controller.matrixWorld;
  _selectOrigin.setFromMatrixPosition(mat);
  _selectDirection.set(0, 0, -1).applyQuaternion(
    new THREE.Quaternion().setFromRotationMatrix(mat)
  );
  _raycaster.set(_selectOrigin, _selectDirection);

  const hits = _raycaster.intersectObjects(placedModels, true);
  if (hits.length > 0) {
    let obj = hits[0].object;
    while (obj.parent && obj.parent !== scene && !placedModels.includes(obj)) {
      obj = obj.parent;
    }
    if (placedModels.includes(obj)) {
      if (selectedModel === obj && activeMode === 'place') {
        deselect();
        showToast('DESELECTED');
        return;
      }
      selectModel(obj);
      return;
    }
  }

  if (activeMode !== 'place' && !selectedModel) return;
  if (activeMode !== 'place') { deselect(); return; }
  if (!reticle.visible || !modelTemplate) return;
  placeModel();
}

function placeModel() {
  const placed = modelTemplate.clone(true);
  placed.position.setFromMatrixPosition(reticle.matrix);
  placed.rotation.set(0, Math.random() * Math.PI * 2, 0);

  const halfH = modelTemplate.userData?.halfHeight || 0;
  if (halfH) {
    placed.position.y += halfH;
  } else {
    const box = new THREE.Box3().setFromObject(placed);
    placed.position.y += box.getSize(new THREE.Vector3()).y / 2;
  }

  applyColor(placed, PALETTE[colorIdx].three);

  const targetScale = placed.scale.x;
  placed.scale.setScalar(0.001);
  animations.set(placed, { startTime: performance.now(), targetScale });

  scene.add(placed);
  placedModels.push(placed);

  spawnRipple();
  showToast(`MODEL ${placedModels.length} PLACED ✓`);
  updateInfo();
}

function clearAllModels() {
  placedModels.forEach(m => {
    animations.delete(m);
    scene.remove(m);
    m.traverse(child => {
      if (child.isMesh) {
        if (child.geometry) child.geometry.dispose();
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(mat => {
          if (mat && typeof mat.dispose === 'function') mat.dispose();
        });
      }
    });
  });
  placedModels.length = 0;
  animations.clear();
  document.querySelectorAll('.osi').forEach(el => el.remove());
  osiEls.length = 0;
  selectedModel = null;
}

/* ========================================================
   INITIALIZATION
   ======================================================== */
async function init() {
  const $btn = document.getElementById('start-btn');

  if (!('xr' in navigator)) {
    $btn.textContent = 'WebXR Not Supported';
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    $btn.textContent = 'AR Unavailable — Use Android Chrome';
    return;
  }
  $btn.disabled = false;
  $btn.textContent = '▶ START AR PREVIEW';

  scene  = new THREE.Scene();

  const ambient = new THREE.AmbientLight(0xcccccc, 1.2);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0xffffff, 1.0);
  dir.position.set(1, 3, 2);
  scene.add(dir);

  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, CONFIG.MAX_PIXEL_RATIO));
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  const rGeo = new THREE.RingGeometry(0.06, 0.08, 32).rotateX(-Math.PI/2);
  reticle = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({ color: 0xe53935, transparent: true }));
  reticle.visible = false;
  reticle.matrixAutoUpdate = false;
  scene.add(reticle);

  await loadModel();
  modelTemplate.userData = modelTemplate.userData || {};
  const box = new THREE.Box3().setFromObject(modelTemplate);
  modelTemplate.userData.halfHeight = box.getSize(new THREE.Vector3()).y / 2;

  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  const arBtn = ARButton.createButton(renderer, {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: $arUI },
  });
  arBtn.style.display = 'none';
  document.body.appendChild(arBtn);

  $btn.addEventListener('click', () => {
    $overlay.style.display = 'none';
    $arUI.classList.add('active');
    showTrackingToast('POINT AT A FLAT SURFACE', true);
    arBtn.click();
    renderer.setAnimationLoop(onFrame);
    updateInfo();
  });

  renderer.xr.addEventListener('sessionend', () => {
    $overlay.style.display = '';
    $arUI.classList.remove('active');
    hitTestSourceRequested = false;
    hitTestSource = null;
    trackingLost = false;
    hideTrackingToast();
    clearTimeout(hitTestRetryTimer);
    clearAllModels();
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

/* ========================================================
   RENDER LOOP
   ======================================================== */
function requestHitTestSource(session) {
  session.requestReferenceSpace('viewer').then(viewerSpace => {
    return session.requestHitTestSource({ space: viewerSpace });
  }).then(hitSource => {
    hitTestSource = hitSource;
    console.log('[AR] Hit test source obtained (viewer space)');
  }).catch(() => {
    console.warn('[AR] viewer hit-test failed, trying local space...');
    session.requestReferenceSpace('local').then(localSpace => {
      return session.requestHitTestSource({ space: localSpace });
    }).then(hitSource => {
      hitTestSource = hitSource;
      console.log('[AR] Hit test source obtained (local space)');
    }).catch(err => {
      console.error('[AR] Hit test source unavailable:', err);
      clearTimeout(hitTestRetryTimer);
      hitTestRetryTimer = setTimeout(() => {
        if (!hitTestSource) {
          console.log('[AR] Retrying hit-test source...');
          requestHitTestSource(session);
        }
      }, CONFIG.HIT_TEST_RETRY_MS);
    });
  });
}

function onFrame(timestamp, frame) {
  if (!frame) return;

  const session = renderer.xr.getSession();
  if (!session) return;

  const refSpace = renderer.xr.getReferenceSpace();

  if (!hitTestSourceRequested) {
    requestHitTestSource(session);
    hitTestSourceRequested = true;
  }

  if (hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    const now = performance.now();

    if (hits.length > 0) {
      const pose = hits[0].getPose(refSpace);
      if (pose) {
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
        lastHitTime = now;

        if (trackingLost) {
          trackingLost = false;
          hideTrackingToast();
          console.log('[AR] Tracking recovered');
        }
      }
    } else {
      reticle.visible = false;
      if (!trackingLost && now - lastHitTime > CONFIG.TRACKING_LOST_DELAY) {
        trackingLost = true;
        showTrackingToast('POINT AT A FLAT SURFACE');
        console.log('[AR] No hit for', CONFIG.TRACKING_LOST_DELAY, 'ms – showing hint');
      }
    }
  } else {
    if (frame.getViewerPose) {
      const vp = frame.getViewerPose(refSpace);
      if (!vp && !trackingLost) {
        trackingLost = true;
        showTrackingToast('WAITING FOR TRACKING...', true);
        console.log('[AR] Viewer pose lost – waiting');
      } else if (vp && trackingLost) {
        trackingLost = false;
        hideTrackingToast();
        console.log('[AR] Viewer pose recovered');
      }
    }
  }

  const now = performance.now();
  animations.forEach((anim, m) => {
    const t = Math.min(1, (now - anim.startTime) / CONFIG.PLACEMENT_ANIM_MS);
    const ease = 1 - Math.pow(1 - t, 3);
    m.scale.setScalar(anim.targetScale * ease);
    if (t >= 1) animations.delete(m);
  });

  if (reticle.visible) {
    const pulse = 1 + 0.1 * Math.sin(now * 0.005);
    reticle.scale.setScalar(pulse);
    reticle.material.opacity = 0.7 + 0.3 * Math.sin(now * 0.005);
  }

  if (placedModels.length > 0 && now - window._lastOSIUpdate > CONFIG.OSI_UPDATE_INTERVAL) {
    updateOSI();
    window._lastOSIUpdate = now;
  }

  renderer.render(scene, camera);
}
window._lastOSIUpdate = 0;

/* ========================================================
   MODEL LOADING
   ======================================================== */
function normalizeModel(obj) {
  const box  = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const max  = Math.max(size.x, size.y, size.z);

  let scale = 1;
  if      (max > 100) scale = 0.001;
  else if (max > 0.5) scale = 0.01;
  obj.scale.setScalar(scale);

  const b2 = new THREE.Box3().setFromObject(obj);
  obj.position.sub(b2.getCenter(new THREE.Vector3()));

  obj.userData = obj.userData || {};
  obj.userData.halfHeight = (size.y * scale) / 2;
  obj.userData.scale = scale;
}

function loadModel() {
  return new Promise(resolve => {
    new GLTFLoader().load(CONFIG.MODEL_PATH_GLB || 'model.glb', gltf => {
      modelTemplate = gltf.scene;
      normalizeModel(modelTemplate);
      resolve();
    }, undefined, () => {
      new OBJLoader().load(CONFIG.MODEL_PATH_OBJ || 'model.obj', obj => {
        obj.traverse(child => {
          if (child.isMesh)
            child.material = new THREE.MeshStandardMaterial({ color: 0xd32f2f, roughness: 0.3, metalness: 0.1 });
        });
        modelTemplate = obj;
        normalizeModel(modelTemplate);
        resolve();
      }, undefined, () => {
        const b = new THREE.Mesh(
          new THREE.BoxGeometry(0.032, 0.016, 0.024),
          new THREE.MeshStandardMaterial({ color: 0xd32f2f, roughness: 0.3, metalness: 0.1 })
        );
        const stud = new THREE.Mesh(
          new THREE.CylinderGeometry(0.004, 0.004, 0.004, 16),
          b.material.clone()
        );
        stud.position.set(0, 0.010, 0);
        b.add(stud);
        modelTemplate = b;
        normalizeModel(modelTemplate);
        resolve();
      });
    });
  });
}

init();
</script>
