<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Print Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      background: #0c0c0c;
      color: #fff;
      touch-action: none;
    }

    #overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: radial-gradient(ellipse at 60% 40%, #1a0404 0%, #0c0c0c 70%);
      text-align: center; padding: 32px;
    }
    #overlay h1 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 10px; color: #fff;
    }
    #overlay h1 span { color: #e53935; }
    #overlay p {
      font-size: 14px; color: #999; max-width: 340px; line-height: 1.65;
      margin-bottom: 32px; font-family: system-ui, sans-serif;
    }
    #start-btn {
      padding: 14px 36px; font-size: 16px; font-weight: 700;
      font-family: 'Courier New', monospace; letter-spacing: 1px;
      background: #e53935; color: #fff; border: none;
      border-radius: 4px; cursor: pointer;
      box-shadow: 0 0 32px rgba(229,57,53,0.4);
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    #start-btn:disabled { background: #333; box-shadow: none; cursor: not-allowed; color: #666; }
    #start-btn:not(:disabled):hover { box-shadow: 0 0 48px rgba(229,57,53,0.6); }
    .note { font-size: 11px; color: #555; margin-top: 18px; font-family: system-ui; }

    #ar-ui {
      position: fixed; inset: 0; z-index: 50;
      pointer-events: none; display: none;
    }
    #ar-ui.active { display: block; }

    #info-bar {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.85); padding: 9px 22px;
      border-radius: 24px; font-size: 12px; letter-spacing: 0.8px;
      border: 1px solid rgba(255,255,255,0.08); white-space: nowrap;
      pointer-events: none;
    }

    #mode-bar {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; pointer-events: auto;
    }
    .mode-btn {
      padding: 9px 14px; font-size: 11px; font-weight: 700;
      font-family: 'Courier New', monospace; letter-spacing: 0.8px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn.active {
      background: rgba(229,57,53,0.75); border-color: #e53935;
      color: #fff; box-shadow: 0 0 16px rgba(229,57,53,0.3);
    }
    .mode-btn.danger { color: rgba(255,100,100,0.7); }
    .mode-btn.danger:active { background: rgba(150,0,0,0.6); }

    #color-panel {
      position: absolute; bottom: 82px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; padding: 12px 18px;
      background: rgba(0,0,0,0.72); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 40px;
      pointer-events: auto;
      opacity: 0; transform: translateX(-50%) translateY(12px);
      transition: opacity 0.2s, transform 0.2s;
    }
    #color-panel.visible {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    #color-panel:not(.visible) { pointer-events: none; }

    .swatch {
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .swatch.active { border-color: #fff; transform: scale(1.22); }

    #toast {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(229,57,53,0.88); backdrop-filter: blur(12px);
      color: #fff; padding: 8px 22px; border-radius: 20px;
      font-size: 12px; letter-spacing: 0.6px; pointer-events: none;
      opacity: 0; transition: opacity 0.25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    #tracking-toast {
      position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(255,152,0,0.88); backdrop-filter: blur(12px);
      color: #fff; padding: 8px 22px; border-radius: 20px;
      font-size: 12px; letter-spacing: 0.6px; pointer-events: none;
      opacity: 0; transition: opacity 0.25s; white-space: nowrap;
    }
    #tracking-toast.show { opacity: 1; }

    .osi {
      position: absolute; pointer-events: none;
      display: none;
    }
    .osi-badge {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(229,57,53,0.9); border: 2px solid rgba(255,255,255,0.6);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; line-height: 1.1; gap: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .osi-dir { font-size: 13px; }
    .osi-num { font-size: 9px; opacity: 0.85; }

    .ripple {
      position: fixed; border-radius: 50%;
      width: 60px; height: 60px;
      background: rgba(229,57,53,0.5);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-out 0.55s ease-out forwards;
    }
    @keyframes ripple-out {
      to { transform: translate(-50%, -50%) scale(5); opacity: 0; }
    }

    #sel-flash {
      position: fixed; left: 50%; top: 50%;
      width: 70px; height: 70px;
      border: 2.5px solid #e53935; border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      opacity: 0;
    }
    #sel-flash.pop {
      animation: sel-pop 0.35s ease-out forwards;
    }
    @keyframes sel-pop {
      0%  { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
      60% { transform: translate(-50%,-50%) scale(1.3); opacity: 0.8; }
      100%{ transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
    }

    canvas { display: block; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="overlay">
  <h1>AR <span>Print</span> Preview</h1>
  <p>Visualise your model at real-world scale before committing filament. Place, rotate, scale, and recolor — directly in your space.</p>
  <button id="start-btn" disabled>Checking WebXR…</button>
  <p class="note">Android Chrome required for WebXR hit-test</p>
</div>

<div id="ar-ui">
  <div id="info-bar">TAP RING TO PLACE</div>
  <div id="tracking-toast">TRACKING LOST — MOVE SLOWLY</div>
  <div id="color-panel"></div>
  <div id="mode-bar">
    <button class="mode-btn active" id="btn-place" data-mode="place">＋ PLACE</button>
    <button class="mode-btn"        id="btn-rotate" data-mode="rotate">↻ ROTATE</button>
    <button class="mode-btn"        id="btn-scale"  data-mode="scale">⊕ SCALE</button>
    <button class="mode-btn"        id="btn-color"  data-mode="color">● COLOR</button>
    <button class="mode-btn danger" id="btn-clear">✕ CLEAR</button>
  </div>
  <div id="toast"></div>
  <div id="sel-flash"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { ARButton }   from 'three/addons/webxr/ARButton.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader }  from 'three/addons/loaders/OBJLoader.js';

// ──────────────────── CONFIGURATION ────────────────────
const CONFIG = {
  ROTATION_SENSITIVITY: 0.009,
  DRAG_THRESHOLD: 6,
  PLACEMENT_ANIM_MS: 380,
  MIN_SCALE: 0.05,
  MAX_SCALE: 10,
  OSI_MARGIN: 28,
  MODEL_PATH_GLB: 'model.glb',
  MODEL_PATH_OBJ: 'model.obj',
};
// ───────────────────────────────────────────────────────

let camera, scene, renderer, reticle, controller;
let hitTestSource = null, hitTestSourceRequested = false;
let modelTemplate  = null;
const placedModels = [];
let selectedModel  = null;

let activeMode  = 'place';
let dragDist    = 0;
let wasDragging = false;
let t0X = 0, t0Y = 0;
let rotStartY   = 0;
let pinchStartD = 0;
let pinchStartS = 1;

let trackingLost = false;
let trackingToastTimer = null;

const animations = new Map();

const PALETTE = [
  { css: '#d32f2f', three: 0xd32f2f },
  { css: '#e65100', three: 0xe65100 },
  { css: '#f9a825', three: 0xf9a825 },
  { css: '#2e7d32', three: 0x2e7d32 },
  { css: '#1565c0', three: 0x1565c0 },
  { css: '#6a1b9a', three: 0x6a1b9a },
  { css: '#00838f', three: 0x00838f },
  { css: '#f5f5f5', three: 0xf5f5f5 },
  { css: '#212121', three: 0x212121 },
];
let colorIdx = 0;

const DIR8 = ['→','↘','↓','↙','←','↖','↑','↗'];

const $overlay      = document.getElementById('overlay');
const $arUI         = document.getElementById('ar-ui');
const $infoBar      = document.getElementById('info-bar');
const $toast        = document.getElementById('toast');
const $trackingToast = document.getElementById('tracking-toast');
const $colorPanel   = document.getElementById('color-panel');
const $selFlash     = document.getElementById('sel-flash');

PALETTE.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'swatch' + (i === 0 ? ' active' : '');
  el.style.background = c.css;
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    colorIdx = i;
    if (selectedModel) applyColor(selectedModel, c.three);
    showToast('Color applied');
  });
  $colorPanel.appendChild(el);
});

// Stop touch propagation on all UI buttons
document.querySelectorAll('.mode-btn, .swatch').forEach(el => {
  el.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
  el.addEventListener('touchmove',  e => e.stopPropagation(), { passive: true });
  el.addEventListener('touchend',   e => e.stopPropagation(), { passive: true });
});

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});
document.getElementById('btn-clear').addEventListener('click', () => {
  clearAllModels();
  showToast('All models cleared');
  updateInfo();
});

function setMode(m) {
  activeMode = m;
  document.querySelectorAll('.mode-btn[data-mode]').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === m));
  $colorPanel.classList.toggle('visible', m === 'color');
  updateInfo();
}

const INFO_MSGS = {
  place:  ['TAP RING TO PLACE', 'TAP MODEL TO SELECT IT'],
  rotate: ['TAP MODEL TO SELECT', 'DRAG TO ROTATE'],
  scale:  ['TAP MODEL TO SELECT', 'PINCH TO SCALE'],
  color:  ['TAP MODEL TO SELECT', 'PICK A COLOR BELOW'],
};
function updateInfo() {
  const has = !!selectedModel;
  const msgs = INFO_MSGS[activeMode] || [''];
  $infoBar.textContent = msgs[has ? 1 : 0];
}

let toastTimer;
function showToast(msg, ms = 2200) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), ms);
}

function showTrackingToast(msg, ms = 0) {
  $trackingToast.textContent = msg;
  $trackingToast.classList.add('show');
  clearTimeout(trackingToastTimer);
  if (ms > 0) {
    trackingToastTimer = setTimeout(() => $trackingToast.classList.remove('show'), ms);
  }
}

function hideTrackingToast() {
  $trackingToast.classList.remove('show');
  clearTimeout(trackingToastTimer);
}

function applyColor(obj, hex) {
  obj.traverse(child => {
    if (!child.isMesh) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(mat => { if (mat.color) mat.color.setHex(hex); });
  });
}

function setEmissive(obj, hex) {
  obj.traverse(child => {
    if (!child.isMesh) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(mat => { if (mat.emissive) mat.emissive.setHex(hex); });
  });
}

function selectModel(m) {
  if (selectedModel) setEmissive(selectedModel, 0x000000);
  selectedModel = m;
  setEmissive(m, 0x3a0000);
  flashSelectionRing();
  updateInfo();
  showToast('SELECTED — ' + (activeMode === 'rotate' ? 'DRAG TO ROTATE'
    : activeMode === 'scale' ? 'PINCH TO SCALE'
    : activeMode === 'color' ? 'PICK A COLOR'
    : 'SWITCH MODE TO EDIT'));
}

function deselect() {
  if (!selectedModel) return;
  setEmissive(selectedModel, 0x000000);
  selectedModel = null;
  updateInfo();
}

function flashSelectionRing() {
  $selFlash.classList.remove('pop');
  void $selFlash.offsetWidth;
  $selFlash.classList.add('pop');
}

function spawnRipple() {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = '50%';
  r.style.top  = '50%';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

// ──────────────────── OSI (Off-Screen Indicators) ────────────────────
const osiEls = [];
function getOSI(i) {
  if (!osiEls[i]) {
    const el = document.createElement('div');
    el.className = 'osi';
    el.innerHTML = `<div class="osi-badge"><span class="osi-dir"></span><span class="osi-num">#${i+1}</span></div>`;
    $arUI.appendChild(el);
    osiEls[i] = el;
  }
  return osiEls[i];
}
const _projV = new THREE.Vector3();
function updateOSI() {
  const W = window.innerWidth, H = window.innerHeight;
  const margin = CONFIG.OSI_MARGIN;
  placedModels.forEach((m, i) => {
    const el = getOSI(i);
    m.getWorldPosition(_projV);
    _projV.project(camera);

    const sx = (_projV.x  + 1) / 2 * W;
    const sy = (-_projV.y + 1) / 2 * H;
    const behind = _projV.z > 1;
    const onScreen = !behind
      && sx > margin && sx < W - margin
      && sy > margin && sy < H - margin;

    if (onScreen) {
      el.style.display = 'none';
    } else {
      el.style.display = 'block';
      const cx = W / 2, cy = H / 2;
      let dx = sx - cx, dy = sy - cy;

      // Compute angle BEFORE flipping for behind-camera
      let angle = Math.atan2(dy, dx);
      if (behind) {
        dx = -dx;
        dy = -dy;
        angle += Math.PI; // Add 180° so arrow points toward object from screen edge
      }

      const dirIdx = Math.round((angle / Math.PI) * 4 + 4) % 8;
      el.querySelector('.osi-dir').textContent = DIR8[dirIdx];

      const hw = cx - 44, hh = cy - 44;
      const ca = Math.abs(Math.cos(angle)), sa = Math.abs(Math.sin(angle));
      const t  = (hw * sa <= hh * ca) ? hw / (ca || 1e-6) : hh / (sa || 1e-6);

      el.style.left = (cx + Math.cos(angle) * t - 20) + 'px';
      el.style.top  = (cy + Math.sin(angle) * t - 20) + 'px';
    }
  });
}

// ──────────────────── TOUCH HANDLING ────────────────────
document.addEventListener('touchstart', e => {
  dragDist = 0;
  wasDragging = false;
  if (e.touches.length === 1) {
    t0X = e.touches[0].clientX;
    t0Y = e.touches[0].clientY;
    rotStartY = selectedModel ? selectedModel.rotation.y : 0;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartD = Math.hypot(dx, dy);
    pinchStartS = selectedModel ? selectedModel.scale.x : 1;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!selectedModel) return;

  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - t0X;
    const dy = e.touches[0].clientY - t0Y;
    dragDist = Math.hypot(dx, dy);

    if (dragDist > CONFIG.DRAG_THRESHOLD && (activeMode === 'rotate' || activeMode === 'place')) {
      selectedModel.rotation.y = rotStartY + dx * CONFIG.ROTATION_SENSITIVITY;
      wasDragging = true;
    }
  } else if (e.touches.length === 2 && activeMode === 'scale') {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const ratio = dist / (pinchStartD || 1);
    selectedModel.scale.setScalar(
      Math.max(CONFIG.MIN_SCALE, Math.min(CONFIG.MAX_SCALE, pinchStartS * ratio))
    );
    wasDragging = true;
  }
}, { passive: true });

document.addEventListener('touchend', () => {
  // Reset drag flag after a short delay to allow select event to process
  setTimeout(() => { wasDragging = false; }, 50);
}, { passive: true });

// ──────────────────── SELECT & PLACE ────────────────────
const _raycaster = new THREE.Raycaster();
const _selectOrigin = new THREE.Vector3();
const _selectDirection = new THREE.Vector3();

function onSelect() {
  // Ignore if user was dragging
  if (wasDragging) {
    wasDragging = false;
    return;
  }

  // Use controller position/direction for AR raycasting
  const mat = controller.matrixWorld;
  _selectOrigin.setFromMatrixPosition(mat);
  _selectDirection.set(0, 0, -1).applyQuaternion(
    new THREE.Quaternion().setFromRotationMatrix(mat)
  );
  _raycaster.set(_selectOrigin, _selectDirection);

  const hits = _raycaster.intersectObjects(placedModels, true);

  if (hits.length > 0) {
    // Walk up to find the placed root
    let obj = hits[0].object;
    while (obj.parent && obj.parent !== scene && !placedModels.includes(obj)) {
      obj = obj.parent;
    }
    if (placedModels.includes(obj)) {
      // If same model tapped again in place mode, deselect it
      if (selectedModel === obj && activeMode === 'place') {
        deselect();
        showToast('DESELECTED');
        return;
      }
      selectModel(obj);
      return;
    }
  }

  // No hit → place new model
  if (activeMode !== 'place' && !selectedModel) return;
  if (activeMode !== 'place') { deselect(); return; }
  if (!reticle.visible || !modelTemplate) return;

  placeModel();
}

function placeModel() {
  const placed = modelTemplate.clone(true);
  placed.position.setFromMatrixPosition(reticle.matrix);
  placed.rotation.set(0, Math.random() * Math.PI * 2, 0);

  // Use pre-computed half-height for faster placement
  const halfHeight = modelTemplate.userData.halfHeight || 0;
  if (halfHeight > 0) {
    placed.position.y += halfHeight;
  } else {
    // Fallback: compute on the fly (shouldn't happen if normalizeModel ran)
    const box = new THREE.Box3().setFromObject(placed);
    placed.position.y += box.getSize(new THREE.Vector3()).y / 2;
  }

  applyColor(placed, PALETTE[colorIdx].three);

  const targetScale = placed.scale.x;
  placed.scale.setScalar(0.001);
  animations.set(placed, { startTime: performance.now(), targetScale });

  scene.add(placed);
  placedModels.push(placed);

  spawnRipple();
  showToast(`MODEL ${placedModels.length} PLACED ✓`);
  updateInfo();
}

// ──────────────────── CLEANUP ────────────────────
function clearAllModels() {
  placedModels.forEach(m => {
    animations.delete(m);
    scene.remove(m);
    // Dispose geometries/materials to prevent memory leaks
    m.traverse(child => {
      if (child.isMesh) {
        if (child.geometry) child.geometry.dispose();
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(mat => {
          if (mat && typeof mat.dispose === 'function') mat.dispose();
        });
      }
    });
  });
  placedModels.length = 0;
  animations.clear();
  document.querySelectorAll('.osi').forEach(el => el.remove());
  osiEls.length = 0;
  selectedModel = null;
}

// ──────────────────── INITIALIZATION ────────────────────
async function init() {
  const $btn = document.getElementById('start-btn');

  if (!('xr' in navigator)) {
    $btn.textContent = 'WebXR Not Supported'; return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    $btn.textContent = 'AR Unavailable — Use Android Chrome'; return;
  }

  $btn.disabled = false;
  $btn.textContent = '▶ START AR PREVIEW';

  scene  = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 20);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.4);
  hemi.position.set(0, 20, 0);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 1.6);
  dir.position.set(5, 10, 7);
  scene.add(dir);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  const rGeo = new THREE.RingGeometry(0.06, 0.08, 40).rotateX(-Math.PI / 2);
  reticle = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({ color: 0xe53935, transparent: true }));
  reticle.visible = false;
  reticle.matrixAutoUpdate = false;
  scene.add(reticle);

  await loadModel();

  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  const arBtn = ARButton.createButton(renderer, {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: $arUI },
  });
  arBtn.style.display = 'none';
  document.body.appendChild(arBtn);

  $btn.addEventListener('click', () => {
    $overlay.style.display = 'none';
    $arUI.classList.add('active');
    arBtn.click();
    renderer.setAnimationLoop(onFrame);
    updateInfo();
  });

  // Proper session cleanup
  renderer.xr.addEventListener('sessionend', () => {
    $overlay.style.display = '';
    $arUI.classList.remove('active');
    hitTestSourceRequested = false;
    hitTestSource = null;
    trackingLost = false;
    hideTrackingToast();
    clearAllModels();
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

// ──────────────────── RENDER LOOP ────────────────────
let wasTracking = true;

function onFrame(timestamp, frame) {
  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const session  = renderer.xr.getSession();

    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then(vs => {
        session.requestHitTestSource({ space: vs }).then(src => {
          hitTestSource = src;
        }).catch(() => {
          // Hit test source request failed — maybe try local reference space
          session.requestReferenceSpace('local').then(ls => {
            return session.requestHitTestSource({ space: ls });
          }).then(src => {
            hitTestSource = src;
          }).catch(() => {});
        });
      });
      hitTestSourceRequested = true;
    }

    if (hitTestSource) {
      const hits = frame.getHitTestResults(hitTestSource);
      if (hits.length > 0) {
        const pose = hits[0].getPose(refSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
        
        // Tracking is good
        if (trackingLost) {
          trackingLost = false;
          hideTrackingToast();
        }
      } else {
        reticle.visible = false;
        
        // No hits — could be tracking loss or no surfaces
        if (!trackingLost) {
          trackingLost = true;
          showTrackingToast('TRACKING LOST — MOVE SLOWLY');
        }
      }
    }

    // Check tracking state from frame if available
    if (frame.getViewerPose && !hitTestSource) {
      const viewerPose = frame.getViewerPose(refSpace);
      if (!viewerPose && !trackingLost) {
        trackingLost = true;
        showTrackingToast('TRACKING LOST — MOVE SLOWLY');
      } else if (viewerPose && trackingLost) {
        trackingLost = false;
        hideTrackingToast();
      }
    }
  }

  const now = performance.now();

  // Play placement animations
  animations.forEach((anim, m) => {
    const t = Math.min(1, (now - anim.startTime) / CONFIG.PLACEMENT_ANIM_MS);
    const ease = 1 - Math.pow(1 - t, 3);
    m.scale.setScalar(anim.targetScale * ease);
    if (t >= 1) animations.delete(m);
  });

  // Reticle pulse animation
  if (reticle.visible) {
    const pulse = 1 + 0.1 * Math.sin(now * 0.005);
    reticle.scale.setScalar(pulse);
    reticle.material.opacity = 0.7 + 0.3 * Math.sin(now * 0.005);
  }

  if (placedModels.length > 0) updateOSI();

  renderer.render(scene, camera);
}

// ──────────────────── MODEL LOADING ────────────────────
function normalizeModel(obj) {
  const box  = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const max  = Math.max(size.x, size.y, size.z);

  let scale = 1;
  if      (max > 100) scale = 0.001;
  else if (max > 0.5) scale = 0.01;
  obj.scale.setScalar(scale);

  // Calculate new size after scaling
  const scaledSize = size.clone().multiplyScalar(scale);
  
  // Center the model
  const b2 = new THREE.Box3().setFromObject(obj);
  obj.position.sub(b2.getCenter(new THREE.Vector3()));

  // Store pre-computed half-height for faster placement
  obj.userData.halfHeight = scaledSize.y / 2;
  obj.userData.scale = scale;
  obj.userData.originalSize = scaledSize;
}

function loadModel() {
  return new Promise(resolve => {
    new GLTFLoader().load(CONFIG.MODEL_PATH_GLB, gltf => {
      modelTemplate = gltf.scene;
      normalizeModel(modelTemplate);
      resolve();
    }, undefined, () => {
      new OBJLoader().load(CONFIG.MODEL_PATH_OBJ, obj => {
        obj.traverse(child => {
          if (child.isMesh)
            child.material = new THREE.MeshStandardMaterial({ color: 0xd32f2f, roughness: 0.3, metalness: 0.1 });
        });
        modelTemplate = obj;
        normalizeModel(modelTemplate);
        resolve();
      }, undefined, () => {
        const b = new THREE.Mesh(
          new THREE.BoxGeometry(0.032, 0.016, 0.024),
          new THREE.MeshStandardMaterial({ color: 0xd32f2f, roughness: 0.3, metalness: 0.1 })
        );
        const stud = new THREE.Mesh(
          new THREE.CylinderGeometry(0.004, 0.004, 0.004, 16),
          b.material.clone()
        );
        stud.position.set(0, 0.010, 0);
        b.add(stud);
        modelTemplate = b;
        normalizeModel(modelTemplate);
        resolve();
      });
    });
  });
}

init();
</script>
